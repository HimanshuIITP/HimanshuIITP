<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="120" viewBox="0 0 1200 120" role="img" aria-labelledby="title desc">
  <title id="title">Aurora divider</title>
  <desc id="desc">Gradient wave divider used between README sections.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="50%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="35%" stop-color="#3b82f6"/>
      <stop offset="70%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="120" fill="url(#bg)" rx="16"/>

  <path d="M0,66 C110,30 210,100 320,66 C430,30 530,100 640,66 C750,30 850,100 960,66 C1070,30 1140,84 1200,66" fill="none" stroke="url(#line)" stroke-width="4" filter="url(#glow)"/>
  <path d="M0,78 C120,44 220,108 340,78 C460,44 560,108 680,78 C800,44 900,108 1020,78 C1120,54 1165,86 1200,78" fill="none" stroke="url(#line)" stroke-width="2" opacity="0.65"/>

  <circle cx="130" cy="36" r="3" fill="#22d3ee"/>
  <circle cx="350" cy="92" r="3" fill="#3b82f6"/>
  <circle cx="600" cy="26" r="3" fill="#8b5cf6"/>
  <circle cx="860" cy="94" r="3" fill="#f97316"/>
  <circle cx="1080" cy="34" r="3" fill="#22d3ee"/>
</svg>
