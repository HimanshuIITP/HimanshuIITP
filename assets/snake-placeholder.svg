<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="260" viewBox="0 0 1200 260" role="img" aria-labelledby="title desc">
  <title id="title">Snake animation placeholder</title>
  <desc id="desc">Placeholder image shown while contribution snake workflow output is unavailable.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="260" fill="url(#bg)" rx="14"/>
  <rect x="40" y="46" width="1120" height="4" fill="url(#accent)"/>
  <rect x="40" y="210" width="1120" height="4" fill="url(#accent)"/>

  <text x="600" y="118" fill="#e5e7eb" font-size="34" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-weight="700">
    Snake Animation Unavailable
  </text>
  <text x="600" y="156" fill="#c9d1d9" font-size="22" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif">
    Enable the GitHub Action to regenerate contribution snake SVG files.
  </text>
</svg>
